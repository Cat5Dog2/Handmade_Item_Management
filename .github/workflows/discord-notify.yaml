name: Discord Notify for X
on:
  push:
  pull_request:
    types:
      - opened
      - synchronize
      - closed

jobs:
  discord-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Post commit message on push
        if: github.event_name == 'push'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          MESSAGE=$(cat <<EOF
📦 Push: ${{ github.repository }}
Branch: ${{ github.ref_name }}
Commit: $COMMIT_MSG

URL: ${{ github.event.head_commit.url }}
#個人開発 #100DaysOfCode
EOF
          )
          jq -n --arg content "$MESSAGE" '{content: $content}' | curl -H "Content-Type: application/json" -X POST -d @- "$DISCORD_WEBHOOK_URL"

      - name: Post PR info to Discord
        if: github.event_name == 'pull_request'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          MESSAGE=$(cat <<EOF
🔄 PR #${{ github.event.pull_request.number }}: ${{ github.repository }}
Branch: ${{ github.head_ref }}
Title: $PR_TITLE
By: ${{ github.event.pull_request.user.login }}

URL: ${{ github.event.pull_request.html_url }}
#個人開発 #100DaysOfCode
EOF
          )
          jq -n --arg content "$MESSAGE" '{content: $content}' | curl -H "Content-Type: application/json" -X POST -d @- "$DISCORD_WEBHOOK_URL"