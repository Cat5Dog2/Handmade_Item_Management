steps:
  - id: build-api-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_API_IMAGE}:$SHORT_SHA
      - .

  - id: push-api-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_API_IMAGE}:$SHORT_SHA

  - id: deploy-api-to-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_CLOUD_RUN_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_API_IMAGE}:$SHORT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      - PORT=8080,API_BASE_PATH=/api,APP_OWNER_EMAIL=${_APP_OWNER_EMAIL},CORS_ORIGIN=${_CORS_ORIGIN},GOOGLE_CLOUD_PROJECT=${_FIREBASE_PROJECT_ID},FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID},FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET},SIGNED_URL_EXPIRES_MINUTES=60,IMAGE_MAX_FILE_SIZE_MB=10,IMAGE_MAX_COUNT_PER_PRODUCT=10,IMAGE_DISPLAY_MAX_EDGE_PX=2000,IMAGE_THUMB_MAX_EDGE_PX=400,IMAGE_OUTPUT_FORMAT=webp,IMAGE_DISPLAY_WEBP_QUALITY=82,IMAGE_THUMB_WEBP_QUALITY=75,PRODUCT_ID_PREFIX=HM-,PRODUCT_ID_DIGITS=6,PRODUCT_COUNTER_DOCUMENT_PATH=counters/product
      - --quiet

  - id: build-web
    name: node:20-bookworm-slim
    entrypoint: bash
    env:
      - VITE_API_BASE_URL=/api
      - VITE_USE_FIREBASE_EMULATORS=false
      - VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}
      - VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}
      - VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}
      - VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}
      - VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}
      - VITE_FIREBASE_MEASUREMENT_ID=${_VITE_FIREBASE_MEASUREMENT_ID}
    args:
      - -lc
      - npm ci && npm run build:web

  - id: deploy-web-to-hosting
    name: node:20-bookworm-slim
    entrypoint: bash
    args:
      - -lc
      - npx --yes firebase-tools@13.35.1 deploy --only hosting --project ${_FIREBASE_PROJECT_ID}

substitutions:
  _REGION: asia-northeast1
  _CLOUD_RUN_SERVICE: handmade-sales-api
  _ARTIFACT_REPOSITORY: handmade-sales-api
  _API_IMAGE: api
  _APP_OWNER_EMAIL: your-login-email@example.com
  _CORS_ORIGIN: https://handmade-item-management.web.app
  _FIREBASE_PROJECT_ID: handmade-item-management
  _FIREBASE_STORAGE_BUCKET: handmade-item-management.firebasestorage.app
  _VITE_FIREBASE_API_KEY: your_firebase_web_api_key
  _VITE_FIREBASE_AUTH_DOMAIN: handmade-item-management.firebaseapp.com
  _VITE_FIREBASE_STORAGE_BUCKET: handmade-item-management.firebasestorage.app
  _VITE_FIREBASE_MESSAGING_SENDER_ID: "1234567890"
  _VITE_FIREBASE_APP_ID: 1:1234567890:web:abcdef1234567890
  _VITE_FIREBASE_MEASUREMENT_ID: ""

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
